<!doctype html>
<html>
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, user-scalable=0"/>
<style>
:root {
	--card-width: 1.3em;
	--card-height: 2em;
	--gap: .2em;
	--edge-gap: calc(var(--card-height) / 2 + var(--gap));
	--fg: #fff;
	--inv: #111;
}

html, body {
	margin: 0; padding: 0;
	height: 100%;
	overflow: hidden;
	background: #242;
	font: 130% monospace; color: var(--fg);
}

a {
	color: var(--fg);
	text-decoration: none;
}

.dialog {
	position: fixed;
	top: 50svh; left: 50vw;
	transform: translate(-50%, -50%);
	text-align: center;
	background: var(--inv); color: var(--fg);
	padding: .5em 1em;
	border-radius: .3em;
	filter: drop-shadow(0 0 .1em black);
}

.play {
	background: var(--fg); color: var(--inv);
	display: inline-block;
	padding: .1em .3em;
	font-size: 250%;
	font-weight: bold;
	text-align: center;
	border-radius: .1em;
	margin: .2em;
}

.card {
	position: fixed;
	top: 50svh; left: 50vw;
	transform: translate(-50%, -50%) translate(var(--dx, 0), var(--dy, 0));
	transition: transform .35s ease;
	width: var(--card-width); height: var(--card-height);
	border-radius: .1em;
	background: var(--fg); color: var(--inv);
	font-size: 250%;
	font-weight: bold;
	display: flex;
	align-items: center;
	justify-content: center;
	filter: drop-shadow(0 0 .1em black);
	user-select: none;
	outline: 0 solid transparent;
	will-change: transform;
}

.card.cat {
	background-color: var(--inv);
	background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 130 200"><path d="M 89.54 43.49 C 93.55 42.92 93.44 45.77 93.8 48.3 C 95.03 56.93 99.55 55.11 104.69 64.21 C 108 70.1 109.63 81.68 104.27 87.94 C 103.09 89.32 101.86 90.66 100.78 92.13 C 100.25 92.85 104.19 100.69 102.17 109.29 C 100.99 114.34 99 119.16 99.52 124.37 C 99.63 125.41 99.84 126.46 100.22 127.44 C 101.02 129.52 103.24 131.75 102.73 134.28 C 101.49 140.5 98.56 146.84 95.61 152.42 C 94.94 153.7 93.92 155.33 92.33 155.7 C 91.58 155.88 87.73 155.81 86.75 155.56 C 85.86 155.33 84.96 154.45 85.29 153.4 C 85.57 152.49 86.03 151.57 86.75 150.96 C 87.71 150.14 89.41 150.36 90.17 149.35 C 90.99 148.26 92.19 144.55 92.4 143.77 C 93.01 141.55 93.97 137.79 92.54 135.53 C 91.99 134.66 91.18 132.67 90.38 132.67 C 89.76 132.67 88.92 137.78 88.22 139.58 C 86.62 143.7 85.56 145.76 83.33 149.77 C 81.87 152.41 81.71 152.61 79.07 153.05 C 78.07 153.22 75.48 153.68 74.05 153.05 C 71.93 152.12 73.05 149.64 74.47 148.44 C 75.15 147.87 77.28 147.99 78.03 146.98 C 79.94 144.41 80.76 140.73 81.24 137.63 C 82.01 132.63 78.01 129.85 75.38 125.9 C 74.12 124.02 73.68 121.71 72.66 119.69 C 72.59 119.57 66.13 122.84 66.03 124.65 C 65.96 125.84 66.06 127.23 65.75 128.42 C 63.94 135.15 60.53 144.61 57.65 150.61 C 57.04 151.88 55.19 156 52.7 156.4 C 51.23 156.63 49.72 156.6 48.23 156.54 C 45.11 156.4 44.46 154.15 46.56 151.79 C 47.24 151.03 48.84 150.92 49.63 150.54 C 50.18 150.27 52.94 140.78 53.6 136.65 C 53.77 135.64 53.96 131.51 53.81 131.42 C 52.77 130.79 52.46 131.64 52.35 132.46 C 52.34 132.5 51.46 137.15 50.53 139.72 C 49.65 142.18 48.67 144.6 47.6 146.98 C 45.5 151.64 42.35 157.92 35.67 154.73 C 33.61 153.74 34.66 151.41 35.95 150.12 C 37.1 148.96 37.63 149.69 39.02 149.28 C 39.3 149.2 40.83 145.51 41.18 144.19 C 42.85 138.01 41.88 124.23 41.88 124.23 C 35.06 117.17 32.68 103.75 30.03 102.12 C 28.27 101.22 18.92 93 23.64 84.19 C 23.64 84.19 21.58 73.22 22.83 72.94 C 26.39 72.14 31. 	background-size: cover;
	background-repeat: no-repeat;
	background-position: center;
}

.card.top, .card.bottom {
	--dx: calc(var(--i, 0) * (var(--card-width) + var(--gap)));
}
.card.left, .card.right {
	--dy: calc(var(--i, 0) * (var(--card-width) + var(--gap)));
}

.card.top    {
	--dy: calc(-50svh + var(--edge-gap));
	transform: translate(-50%, -50%) translate(var(--dx, 0), var(--dy, 0)) rotateZ(180deg);
}
.card.bottom {
	--dy: calc(50svh - var(--edge-gap));
}
.card.left   {
	--dx: calc(-50vw + var(--edge-gap));
	transform: translate(-50%, -50%) translate(var(--dx, 0), var(--dy, 0)) rotateZ(90deg);
}
.card.right  {
	--dx: calc(50vw - var(--edge-gap));
	transform: translate(-50%, -50%) translate(var(--dx, 0), var(--dy, 0)) rotateZ(-90deg);
}

@supports not (height: 1svh) {
	.card {
		top: 50vh; left: 50vw;
	}
	.card.top {
		--dy: calc(-50vh + var(--edge-gap));
	}
	.card.bottom {
		--dy: calc(50vh - var(--edge-gap));
	}
}

.bar {
	position: fixed;
	background: var(--inv); color: var(--fg);
	font-size: 50%;
	font-weight: bold;
	letter-spacing: .2em;
	padding: 1em;
	filter: drop-shadow(0 0 .1em black);
}

.bar.bottom {
	left: 0; right: 0; bottom: 0;
}

.bar.left {
	top: 0; bottom: 0;
	writing-mode: vertical-rl;
	text-orientation: sideways;
}

.bar.top {
	transform: rotate(180deg);
	top: 0; left: 0; right: 0;
}

.bar.right {
	top: 0; bottom: 0; right: 0;
	transform: rotate(180deg);
	writing-mode: vertical-lr;
	text-orientation: sideways;
}

.flash {
	position: fixed;
	width: 100vw;
	height: 100svh;
	z-index: 99999;
	pointer-events: none;
}
</style>
</head>

</body>

</html>
