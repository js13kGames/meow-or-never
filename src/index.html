<!doctype html>
<html>
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, user-scalable=0"/>
<style>
:root {
	--card-width: 1.3em;
	--card-height: 2em;
	--gap: .2em;
	--edge-gap: calc(var(--card-height) / 2 + var(--gap));
	--fg: #fff;
	--bg: #123;
}

html, body {
	margin: 0; padding: 0;
	height: 100%;
	overflow: hidden;
	background: var(--bg);
	font: 130% monospace; color: var(--fg);
}

a {
	color: var(--fg);
	text-decoration: none;
}

.dialog {
	position: fixed;
	top: 50svh; left: 50vw;
	transform: translate(-50%, -50%);
	text-align: center;
}

.play {
	background: var(--fg); color: var(--bg);
	display: block;
	padding: .1em;
	font-size: 250%;
	font-weight: bold;
	text-align: center;
	border-radius: .1em;
	margin: .2em;
}

.card {
	position: fixed;
	top: 50svh; left: 50vw;
	transform: translate(-50%, -50%) translate(var(--dx, 0), var(--dy, 0));
	transition: transform .35s ease;
	width: var(--card-width); height: var(--card-height);
	border-radius: .1em;
	background: var(--fg); color: var(--bg);
	font-size: 250%;
	font-weight: bold;
	display: flex;
	align-items: center;
	justify-content: center;
	filter: drop-shadow(0 0 .1em black);
	user-select: none;
	outline: 0 solid transparent;
	will-change: transform;
}

.card.top, .card.bottom {
	--dx: calc(var(--i, 0) * (var(--card-width) + var(--gap)));
}
.card.left, .card.right {
	--dy: calc(var(--i, 0) * (var(--card-width) + var(--gap)));
}

.card.top    {
	--dy: calc(-50svh + var(--edge-gap));
	transform: translate(-50%, -50%) translate(var(--dx, 0), var(--dy, 0)) rotateZ(180deg);
}
.card.bottom {
	--dy: calc(50svh - var(--edge-gap));
}
.card.left   {
	--dx: calc(-50vw + var(--edge-gap));
	transform: translate(-50%, -50%) translate(var(--dx, 0), var(--dy, 0)) rotateZ(90deg);
}
.card.right  {
	--dx: calc(50vw - var(--edge-gap));
	transform: translate(-50%, -50%) translate(var(--dx, 0), var(--dy, 0)) rotateZ(-90deg);
}

@supports not (height: 1svh) {
	.card {
		top: 50vh; left: 50vw;
	}
	.card.top {
		--dy: calc(-50vh + var(--edge-gap));
	}
	.card.bottom {
		--dy: calc(50vh - var(--edge-gap));
	}
}

.bar {
	position: fixed;
	background: var(--fg);
	color: var(--bg);
	font-size: 80%;
	padding: .5em;
	visibility: hidden;
}

.bar.bottom {
	left: 0; right: 0; bottom: 0;
}

.bar.left {
	top: 0; bottom: 0;
	writing-mode: vertical-rl;
	text-orientation: sideways;
}

.bar.top {
	transform: rotate(180deg);
	top: 0; left: 0; right: 0;
}

.bar.right {
	top: 0; bottom: 0; right: 0;
	transform: rotate(180deg);
	writing-mode: vertical-lr;
	text-orientation: sideways;
}

.flash {
	position: fixed;
	width: 100vw;
	height: 100svh;
	z-index: 99999;
	pointer-events: none;
}
</style>
</head>
<body>
</body>
<script src="src.js"></script>
</html>
